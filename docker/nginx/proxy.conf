# ================================================
# HRMS Narwasthu Group - Reverse Proxy Config
# ================================================

# Upstream definitions
upstream backend_upstream {
    server hrms-backend-prod:80;
    keepalive 32;
}

upstream frontend_upstream {
    server hrms-frontend-prod:3000;
    keepalive 16;
}

# ── Main entrypoint (port 80) ───────────────────────────────
server {
    listen 80;
    server_name _;

    # Health check for proxy itself
    location = /health {
        access_log off;
        return 200 '{"status":"proxy_healthy"}';
        add_header Content-Type application/json;
    }

    # Route API requests to Laravel backend
    location /api {
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60;
        proxy_send_timeout 60;
        proxy_read_timeout 60;
        proxy_buffering off;
    }

    # Route storage requests to Laravel backend
    location /storage {
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_valid 200 7d;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Everything else goes to Next.js frontend
    location / {
        proxy_pass http://frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# ── Backend Direct Access (port 8000) ────────────────────────
server {
    listen 8000;
    server_name _;

    location / {
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60;
        proxy_send_timeout 60;
        proxy_read_timeout 60;
        client_max_body_size 55M;
    }
}

# ── Frontend Direct Access (port 3000) ───────────────────────
server {
    listen 3000;
    server_name _;

    location / {
        proxy_pass http://frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
