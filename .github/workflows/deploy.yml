name: 🚀 Production CI/CD

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and Push Docker Images to GHCR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Lowercase Repository Owner
        id: prep
        run: |
          echo "owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.prep.outputs.owner }}/saas-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://ontime.jelantik.com/api
          tags: ghcr.io/${{ steps.prep.outputs.owner }}/saas-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VM via Self-Hosted Runner
    runs-on: self-hosted
    needs: build-and-push

    steps:
      - name: Pre-cleanup permissions
        run: |
          sudo chown -R $USER:$USER . || true

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          clean: true
          persist-credentials: false

      - name: Create .env file from Secrets
        env:
          ENV_PROD_CONTENT: ${{ secrets.ENV_PROD }}
        run: |
          echo "$ENV_PROD_CONTENT" > .env.prod

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull and Deploy with Docker Compose
        run: |
          echo "Memulai Pull Image Terbaru..."
          docker compose -f docker-compose.prod.yml pull
          echo "Memulai Deployment di Server..."
          docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --remove-orphans
          docker image prune -f
          echo "Deployment Selesai Berhasil!"
