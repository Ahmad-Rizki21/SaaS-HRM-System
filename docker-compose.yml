# ============================================================
# HRMS Narwasthu Group - Docker Compose (Enterprise Stack)
# ============================================================
# Services: Backend (Laravel), Frontend (Next.js), MySQL, Redis, Nginx Proxy
# ============================================================

services:
  # ── MySQL Database ─────────────────────────────────────────
  mysql:
    image: mysql:8.4
    container_name: hrms-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-HrmsN@rwasthu2026!}
      MYSQL_DATABASE: ${DB_DATABASE:-hrm_saas}
      MYSQL_USER: ${DB_USERNAME:-hrms_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-HrmsSecure2026!}
    ports:
      - "${DB_PORT_EXPOSE:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/hrms.cnf:ro
    networks:
      - hrms-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-HrmsN@rwasthu2026!}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Redis Cache ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hrms-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-HrmsRedis2026!} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT_EXPOSE:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - hrms-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-HrmsRedis2026!}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Backend (Laravel API) ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hrms-backend
    restart: unless-stopped
    environment:
      APP_NAME: HRMS
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY:-base64:uk0t72Xm52XfN84TBJEPc1Ku98c29PsluiEKm+kl3Jw=}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost:8000}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-hrm_saas}
      DB_USERNAME: ${DB_USERNAME:-hrms_user}
      DB_PASSWORD: ${DB_PASSWORD:-HrmsSecure2026!}
      SESSION_DRIVER: database
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-HrmsRedis2026!}
      REDIS_PORT: 6379
      FILESYSTEM_DISK: local
      MAIL_MAILER: smtp
      MAIL_HOST: ${MAIL_HOST:-mail.narwastuarthatama.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-no_replay@narwastuarthatama.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-satlink2020}
      MAIL_ENCRYPTION: tls
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-no_replay@narwastuarthatama.com}
      MAIL_FROM_NAME: "HRMS Narwastu Arthatama"
      FIREBASE_CREDENTIALS: storage/app/firebase-auth.json
      BCRYPT_ROUNDS: 12
      LOG_CHANNEL: stack
      LOG_LEVEL: ${LOG_LEVEL:-warning}
    volumes:
      - backend_storage:/var/www/html/storage/app/public
      - backend_logs:/var/www/html/storage/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hrms-network
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Frontend (Next.js Dashboard) ───────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
    container_name: hrms-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
      NODE_ENV: production
    depends_on:
      - backend
    networks:
      - hrms-network
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Nginx Reverse Proxy ────────────────────────────────────
  nginx-proxy:
    image: nginx:1.27-alpine
    container_name: hrms-proxy
    restart: unless-stopped
    ports:
      - "${PROXY_HTTP_PORT:-80}:80"
      - "${PROXY_HTTPS_PORT:-443}:443"
      - "8000:8000"
      - "3000:3000"
    volumes:
      - ./docker/nginx/proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - hrms-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

# ── Volumes ────────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  backend_storage:
    driver: local
  backend_logs:
    driver: local

# ── Networks ───────────────────────────────────────────────
networks:
  hrms-network:
    driver: bridge
    name: hrms-network
