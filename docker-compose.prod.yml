version: '3.8'

services:
  # ── Backend (Laravel) ─────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hrms-backend-prod
    restart: always
    env_file: .env.prod
    depends_on:
      mysql-master:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hrms-prod-network

  # ── Frontend (Next.js) ────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://ontime.jelantik.com/api
    container_name: hrms-frontend-prod
    restart: always
    env_file: .env.prod
    depends_on:
      - backend
    networks:
      - hrms-prod-network

  # ── MySQL Master ──────────────────────────────────
  mysql-master:
    image: mysql:8.4
    container_name: hrms-mysql-master-prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE:-hrm_saas}
      MYSQL_USER: ${DB_USERNAME:-hrms_user}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_master_data:/var/lib/mysql
    networks:
      - hrms-prod-network
    healthcheck:
      test: mysqladmin ping -p${MYSQL_ROOT_PASSWORD} || exit 1
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Redis ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hrms-redis-prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - hrms-prod-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Nginx Gateway ─────────────────────────────────
  nginx-proxy:
    image: nginx:1.27-alpine
    container_name: hrms-proxy-prod
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - hrms-prod-network

networks:
  hrms-prod-network:
    driver: bridge

volumes:
  mysql_master_data:
  redis_data:
