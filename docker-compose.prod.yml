version: '3.8'

services:
  # ── Backend (Laravel) ─────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hrms-backend
    restart: always
    env_file: .env.prod
    environment:
      DB_READ_HOST: mysql-slave
    depends_on:
      - mysql-master
      - mysql-slave
      - redis
    networks:
      - hrms-prod-network

  # ── Frontend (Next.js) ────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://ontime.jelantik.com/api
    container_name: hrms-frontend
    restart: always
    env_file: .env.prod
    depends_on:
      - backend
    networks:
      - hrms-prod-network

  # ── MySQL Master (Writes) ──────────────────────────────────
  mysql-master:
    image: mysql:8.4
    container_name: hrms-mysql-master
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-HrmsN@rwasthu2026!}
      MYSQL_DATABASE: ${DB_DATABASE:-hrm_saas}
      MYSQL_USER: ${DB_USERNAME:-hrms_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-HrmsSecure2026!}
    command: 
      - "--server-id=1"
      - "--log-bin=mysql-bin"
      - "--binlog-format=ROW"
      - "--enforce-gtid-consistency=ON"
      - "--gtid-mode=ON"
      - "--mysql-native-password=ON"
    volumes:
      - mysql_master_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - hrms-prod-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-OnTimeNarwastugo2026}"]
      interval: 20s
      timeout: 10s
      retries: 5

  # ── MySQL Slave (Reads) ──────────────────────────────────
  mysql-slave:
    image: mysql:8.4
    container_name: hrms-mysql-slave
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-HrmsN@rwasthu2026!}
    command:
      - "--server-id=2"
      - "--log-bin=mysql-bin"
      - "--relay-log=mysql-relay-bin"
      - "--read-only=1"
      - "--enforce-gtid-consistency=ON"
      - "--gtid-mode=ON"
      - "--mysql-native-password=ON"
    volumes:
      - mysql_slave_data:/var/lib/mysql
      - ./docker/mysql/init-slave.sql:/docker-entrypoint-initdb.d/01-init-slave.sql:ro
    depends_on:
      - mysql-master
    networks:
      - hrms-prod-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-OnTimeNarwastugo2026}"]
      interval: 20s
      timeout: 10s
      retries: 5

  # ── Redis ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hrms-redis
    restart: always
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-OnTimeNarwastugo2026}"]
    volumes:
      - redis_data:/data
    networks:
      - hrms-prod-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-OnTimeNarwastugo2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Nginx Gateway ─────────────────────────────────
  nginx-proxy:
    image: nginx:1.27-alpine
    container_name: hrms-proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - hrms-prod-network

  # ── Monitoring Agents (Exporters) ─────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: hrms-node-exporter
    restart: always
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    networks:
      - hrms-prod-network

  mysql-exporter:
    image: prom/mysqld-exporter:v0.16.0
    container_name: hrms-mysql-exporter
    restart: always
    environment:
      MYSQLD_EXPORTER_PASSWORD: ${MYSQL_ROOT_PASSWORD:-HrmsN@rwasthu2026!}
    command:
      - "--mysqld.address=mysql-master:3306"
      - "--mysqld.username=root"
      - "--no-collect.slave_status"
    ports:
      - "9104:9104"
    depends_on:
      mysql-master:
        condition: service_healthy
    networks:
      - hrms-prod-network

networks:
  hrms-prod-network:
    driver: bridge

volumes:
  mysql_master_data:
  mysql_slave_data:
  redis_data:
